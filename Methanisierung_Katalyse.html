<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalyse bei der Methanisierung – Teilchenanimation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f7f6f2;
    --surface:  #ffffff;
    --border:   #e2e0d8;
    --text:     #1a1a18;
    --muted:    #6b6960;
    --accent:   #2d5a3d;
    --bg2:      #eeede8;
  }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: #fff;
    padding: 32px 40px 28px;
  }

  header nav {
    margin-bottom: 18px;
  }

  .back-link {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    transition: color 0.15s;
  }
  .back-link:hover { color: #fff; }

  header .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.65;
    margin-bottom: 8px;
  }

  header h1 {
    font-size: clamp(22px, 3.5vw, 34px);
    font-weight: normal;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  header p {
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.72;
    font-style: italic;
  }

  /* ── Main ── */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }

  /* ── Animation wrapper ── */
  .anim-wrap {
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  /* ── Phase info ── */
  .phase-badge {
    flex-shrink: 0;
    margin-top: 2px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 10px;
    border-radius: 20px;
    background: #d1fae5;
    color: #065f46;
    white-space: nowrap;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  button {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.4px;
    padding: 6px 14px;
    border: 1px solid #c8c6be;
    background: var(--surface);
    border-radius: 4px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.1s, border-color 0.1s;
  }
  button:hover { background: var(--bg); border-color: var(--accent); }
  button:active { transform: scale(0.98); }

  input[type="range"] {
    cursor: pointer;
    accent-color: var(--accent);
  }

  /* ── Reaction box ── */
  .reaction-box {
    margin-top: 10px;
    padding: 8px 14px;
    background: var(--bg2);
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    font-family: 'Courier New', monospace;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <nav><a href="index.html" class="back-link">← Übersicht</a></nav>
  <div class="eyebrow">Klasse 9 · Power-to-Gas · Katalyse</div>
  <h1>Katalyse bei der Methanisierung</h1>
  <p>Teilchenanimation der Sabatier-Reaktion</p>
</header>

<main>
<div class="anim-wrap">

  <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px">
    <span id="pbadge" class="phase-badge">Phase 1 / 6</span>
    <div style="flex:1">
      <div id="ptitle" style="font-size:15px;font-weight:bold;color:#1a1a18;margin-bottom:2px"></div>
      <div id="pdesc" style="font-size:12.5px;color:#6b6960;line-height:1.45"></div>
    </div>
  </div>

  <canvas id="ac" style="width:100%;border-radius:6px;border:1px solid #e2e0d8;display:block"></canvas>

  <div class="controls">
    <button id="bplay" onclick="aToggle()">▶ Abspielen</button>
    <button onclick="aGo(-1)">‹ Zurück</button>
    <button onclick="aGo(1)">Weiter ›</button>
    <button onclick="aReset()">↺ Neustart</button>
    <div style="flex:1;min-width:4px"></div>
    <label style="font-family:'Courier New',monospace;font-size:11px;color:#6b6960">Tempo</label>
    <input type="range" min="0.3" max="2.5" step="0.1" value="0.3" style="width:72px" oninput="aSpd=+this.value">
  </div>

  <div class="reaction-box">
    <span style="font-weight:bold;color:#1a1a18">CO₂ + 4 H₂</span>
    <span style="color:#6b6960">─[Ni, Energie]→</span>
    <span style="font-weight:bold;color:#1a1a18">CH₄ + 2 H₂O</span>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#404040;border:1.5px solid #666"></span>C</div>
    <div class="legend-item"><span class="legend-dot" style="background:#D03030;border:1.5px solid #A01010"></span>O</div>
    <div class="legend-item"><span class="legend-dot" style="background:#5090E0;border:1.5px solid #3070B0"></span>H</div>
    <div class="legend-item"><span class="legend-dot" style="background:#C8A020;border:1.5px solid #906010"></span>Ni (aktiv, golden)</div>
    <div class="legend-item"><span class="legend-dot" style="background:#B0B4BC;border:1.5px solid #808490"></span>Ni (inaktiv)</div>
  </div>

</div>
</main>

<footer>
  Chemie · Unterrichtsmaterialien &nbsp;·&nbsp; github.io
</footer>

<script>
const aW=680,aH=490,aCV=document.getElementById('ac'),aCX=aCV.getContext('2d');
aCV.width=aW;aCV.height=aH;
const aC={
  bgGas:'#EDF2F7',bgCat:'#D8DAE8',
  aFg:'rgba(75,95,125,0.55)',
  niS:'#B0B4BC',niSS:'#808490',
  bd:'#888',bdAct:'#B06020',bdH2:'#4488CC',
  pbnd:'#555',
  lCO2:'#223344',lH2:'#1858A0',
  lHs:'#1848A0',lCH4:'#222',lH2O:'#880000',
  dOn:'#185FA5',dOff:'#B5D4F4'
};
const aPH=[
  {t:'Gasphase',d:'CO₂ und H₂ liegen als freie Moleküle im Gasraum vor. Noch keine Wechselwirkung mit dem Nickel-Katalysator.'},
  {t:'Annäherung',d:'Anziehungskräfte ziehen die Moleküle zu den Nickel-Atomen hin.'},
  {t:'Anlagerung',d:'Bindungen bilden sich zwischen Molekülen und Ni-Atomen. H–H- und C=O-Bindungen werden geschwächt.'},
  {t:'Aufspaltung der Wasserstoffmoleküle',d:'H₂ zerfällt in einzelne H-Atome auf der Ni-Oberfläche. Diese können frei wandern. Das CO₂ bleibt gebunden.'},
  {t:'Reaktion auf der Oberfläche',d:'H-Atome wandern zu CO₂ und reagieren schrittweise. Es entstehen CH₄ und H₂O auf der Oberfläche.'},
  {t:'Desorption',d:'CH₄ und H₂O verlassen die Oberfläche. Die freien Ni-Atome sind für weitere Reaktionen bereit.'}
];
const aKF=[
  {c:{x:280,y:115},o1:{x:248,y:115},o2:{x:312,y:115},ha1:{x:95,y:92},hb1:{x:120,y:92},ha2:{x:148,y:158},hb2:{x:173,y:158},ha3:{x:450,y:95},hb3:{x:475,y:95},ha4:{x:557,y:138},hb4:{x:582,y:138}},
  {c:{x:355,y:248},o1:{x:323,y:248},o2:{x:387,y:248},ha1:{x:153,y:255},hb1:{x:178,y:255},ha2:{x:248,y:255},hb2:{x:273,y:255},ha3:{x:438,y:255},hb3:{x:463,y:255},ha4:{x:533,y:255},hb4:{x:558,y:255}},
  {c:{x:355,y:346},o1:{x:323,y:346},o2:{x:387,y:346},ha1:{x:153,y:350},hb1:{x:178,y:350},ha2:{x:248,y:350},hb2:{x:273,y:350},ha3:{x:438,y:350},hb3:{x:463,y:350},ha4:{x:533,y:350},hb4:{x:558,y:350}},
  {c:{x:355,y:346},o1:{x:323,y:346},o2:{x:387,y:346},ha1:{x:118,y:350},hb1:{x:208,y:350},ha2:{x:213,y:350},hb2:{x:303,y:350},ha3:{x:413,y:350},hb3:{x:503,y:350},ha4:{x:508,y:350},hb4:{x:598,y:350}},
  {c:{x:355,y:346},o1:{x:285,y:350},o2:{x:425,y:350},ha1:{x:335,y:330},hb1:{x:375,y:330},ha2:{x:335,y:362},hb2:{x:375,y:362},ha3:{x:267,y:338},hb3:{x:267,y:362},ha4:{x:443,y:338},hb4:{x:443,y:362}},
  {c:{x:340,y:158},o1:{x:168,y:170},o2:{x:538,y:165},ha1:{x:320,y:142},hb1:{x:360,y:142},ha2:{x:320,y:174},hb2:{x:360,y:174},ha3:{x:150,y:158},hb3:{x:150,y:182},ha4:{x:556,y:153},hb4:{x:556,y:177}}
];
const aNiR=26,aNiR1y=388,aNiR2y=433,aSplit=362;
const aNiR1x=[26,78,130,182,234,286,338,390,442,494,546,598,650];
const aNiR2x=[0,52,104,156,208,260,312,364,416,468,520,572,624,676];
const aKS=['c','o1','o2','ha1','hb1','ha2','hb2','ha3','hb3','ha4','hb4'];
const aHS=['ha1','hb1','ha2','hb2','ha3','hb3','ha4','hb4'];
let aPh=0,aFr=0,aPr=1,aTr=false,aHd=0,aPlaying=false,aSpd=0.3,aGT=0,aLast=null;
const aHDUR=2.2,aTDUR=1.05;
function aLrp(a,b,t){return a+(b-a)*t}
function aEi(t){return t<.5?2*t*t:-1+(4-2*t)*t}
function aFd(e,s,n){return Math.max(0,Math.min(1,(e-s)/(n-s)))}
function aLpp(a,b,t){const e=aEi(t);return{x:aLrp(a.x,b.x,e),y:aLrp(a.y,b.y,e)}}
function aGetSt(){
  const t=aTr?aPr:1,A=aKF[aFr],B=aKF[aPh],st={};
  aKS.forEach(k=>st[k]=aLpp(A[k],B[k],t));
  if(aPh===0&&!aTr){
    const amp=7,f=0.5;
    const of=[
      {x:Math.sin(aGT*f)*amp,y:Math.cos(aGT*f*.7)*amp*.7},
      {x:Math.cos(aGT*f*1.1)*amp,y:Math.sin(aGT*f*.9)*amp},
      {x:Math.sin(aGT*f*.9+1)*amp,y:Math.cos(aGT*f*1.2)*amp},
      {x:Math.cos(aGT*f*1.3+2)*amp,y:Math.sin(aGT*f*.8)*amp},
      {x:Math.sin(aGT*f*.7+3)*amp,y:Math.cos(aGT*f*1.1)*amp}
    ];
    ['c','o1','o2'].forEach(k=>{st[k]={x:st[k].x+of[0].x,y:st[k].y+of[0].y}});
    ['ha1','hb1'].forEach(k=>{st[k]={x:st[k].x+of[1].x,y:st[k].y+of[1].y}});
    ['ha2','hb2'].forEach(k=>{st[k]={x:st[k].x+of[2].x,y:st[k].y+of[2].y}});
    ['ha3','hb3'].forEach(k=>{st[k]={x:st[k].x+of[3].x,y:st[k].y+of[3].y}});
    ['ha4','hb4'].forEach(k=>{st[k]={x:st[k].x+of[4].x,y:st[k].y+of[4].y}});
  }
  return st;
}
function aEff(){return aTr?aFr+aEi(aPr):aPh}
function aAtm(x,y,r,f,s,l){
  aCX.beginPath();aCX.arc(x,y,r,0,Math.PI*2);aCX.fillStyle=f;aCX.fill();
  aCX.strokeStyle=s;aCX.lineWidth=1.5;aCX.stroke();
  if(l){aCX.fillStyle='#fff';aCX.font=`bold ${r>10?11:9}px Arial`;aCX.textAlign='center';aCX.textBaseline='middle';aCX.fillText(l,x,y)}
}
function aLn(x1,y1,x2,y2,dash,w,col){
  aCX.beginPath();aCX.setLineDash(dash?[5,4]:[]);aCX.moveTo(x1,y1);aCX.lineTo(x2,y2);
  aCX.strokeStyle=col||aC.bd;aCX.lineWidth=w||2.5;aCX.stroke();aCX.setLineDash([]);
}
function aLbl(txt,x,y,a,col){
  if(a<.02)return;
  aCX.save();aCX.globalAlpha=a;aCX.fillStyle=col;aCX.font='bold 12px Arial';
  aCX.textAlign='center';aCX.textBaseline='bottom';aCX.fillText(txt,x,y);aCX.restore();
}
function aDraw(){
  const s=aGetSt(),e=aEff();
  aCX.clearRect(0,0,aW,aH);
  aCX.fillStyle=aC.bgGas;aCX.fillRect(0,0,aW,aSplit);
  aCX.fillStyle=aC.bgCat;aCX.fillRect(0,aSplit,aW,aH-aSplit);
  aCX.font='11px Arial';aCX.fillStyle=aC.aFg;aCX.textAlign='left';
  aCX.textBaseline='top';aCX.fillText('Gasraum',10,8);
  aCX.textBaseline='bottom';aCX.fillText('Ni-Katalysatoroberfläche',10,aSplit-5);
  const niA=e<2?aFd(e,1.5,2):e>=4.5?1-aFd(e,4.5,5):1;
  aNiR2x.forEach(nx=>{aAtm(nx,aNiR2y,aNiR,aC.niS,aC.niSS,'Ni')});
  aNiR1x.forEach((nx,i)=>{
    const act=i>=2&&i<=10;
    if(act&&niA>0.01){
      const r2=Math.round(aLrp(176,200,niA)),g2=Math.round(aLrp(180,160,niA)),b2=Math.round(aLrp(192,32,niA));
      aAtm(nx,aNiR1y,aNiR,`rgb(${r2},${g2},${b2})`,niA>0.5?'#806010':'#808490','Ni');
      aCX.save();aCX.beginPath();aCX.arc(nx,aNiR1y,aNiR+4,0,Math.PI*2);aCX.strokeStyle=`rgba(200,160,32,${niA*.28})`;aCX.lineWidth=3;aCX.stroke();aCX.restore();
    } else {aAtm(nx,aNiR1y,aNiR,aC.niS,aC.niSS,'Ni')}
  });
  if(e<2.5){aCX.save();aCX.globalAlpha=1-aFd(e,2.2,2.5);aLn(s.o1.x,s.o1.y-3,s.c.x,s.c.y-3,false,2);aLn(s.o1.x,s.o1.y+3,s.c.x,s.c.y+3,false,2);aLn(s.c.x,s.c.y-3,s.o2.x,s.o2.y-3,false,2);aLn(s.c.x,s.c.y+3,s.o2.x,s.o2.y+3,false,2);aCX.restore()}
  if(e>=2.2&&e<3.5){aCX.save();aCX.globalAlpha=aFd(e,2.2,2.7)*(1-aFd(e,3.2,3.5));aLn(s.o1.x,s.o1.y,s.c.x,s.c.y,true,2,aC.bdAct);aLn(s.c.x,s.c.y,s.o2.x,s.o2.y,true,2,aC.bdAct);aCX.restore()}
  if(e<2.5){aCX.save();aCX.globalAlpha=1-aFd(e,2.2,2.5);[['ha1','hb1'],['ha2','hb2'],['ha3','hb3'],['ha4','hb4']].forEach(([a,b])=>aLn(s[a].x,s[a].y,s[b].x,s[b].y,false,2.5));aCX.restore()}
  if(e>=2.2&&e<3.5){aCX.save();aCX.globalAlpha=aFd(e,2.2,2.7)*(1-aFd(e,3.2,3.5));[['ha1','hb1'],['ha2','hb2'],['ha3','hb3'],['ha4','hb4']].forEach(([a,b])=>aLn(s[a].x,s[a].y,s[b].x,s[b].y,true,2,aC.bdH2));aCX.restore()}
  if(e>=3.7){aCX.save();aCX.globalAlpha=aFd(e,3.7,4.2);['ha1','hb1','ha2','hb2'].forEach(k=>aLn(s.c.x,s.c.y,s[k].x,s[k].y,false,2.5,aC.pbnd));aLn(s.o1.x,s.o1.y,s.ha3.x,s.ha3.y,false,2.5,aC.pbnd);aLn(s.o1.x,s.o1.y,s.hb3.x,s.hb3.y,false,2.5,aC.pbnd);aLn(s.o2.x,s.o2.y,s.ha4.x,s.ha4.y,false,2.5,aC.pbnd);aLn(s.o2.x,s.o2.y,s.hb4.x,s.hb4.y,false,2.5,aC.pbnd);aCX.restore()}
  aAtm(s.c.x,s.c.y,15,'#404040','#606060','C');
  aAtm(s.o1.x,s.o1.y,12,'#D03030','#A01010','O');aAtm(s.o2.x,s.o2.y,12,'#D03030','#A01010','O');
  aHS.forEach(k=>aAtm(s[k].x,s[k].y,9,'#5090E0','#3070B0','H'));
  if(e<3.5)aLbl('CO₂',(s.o1.x+s.o2.x)/2,Math.min(s.c.y,s.o1.y,s.o2.y)-20,1-aFd(e,3.0,3.5),aC.lCO2);
  if(e<2.5){const a=1-aFd(e,2.0,2.5);[['ha1','hb1'],['ha2','hb2'],['ha3','hb3'],['ha4','hb4']].forEach(([aa,b])=>aLbl('H₂',(s[aa].x+s[b].x)/2,Math.min(s[aa].y,s[b].y)-13,a,aC.lH2))}
  if(e>=3.0&&e<4.2){const a=aFd(e,3.0,3.5)*(1-aFd(e,3.9,4.2));aHS.forEach(k=>aLbl('H',s[k].x,s[k].y-13,a,aC.lHs))}
  if(e>=4.0){const a=aFd(e,4.0,4.5);aLbl('CH₄',s.c.x,Math.min(s.ha1.y,s.hb1.y)-20,a,aC.lCH4);aLbl('H₂O',s.o1.x,Math.min(s.ha3.y,s.hb3.y)-18,a,aC.lH2O);aLbl('H₂O',s.o2.x,Math.min(s.ha4.y,s.hb4.y)-18,a,aC.lH2O)}
  const dY=320,dS=22,dX0=340-2.5*dS;
  for(let i=0;i<6;i++){aCX.beginPath();aCX.arc(dX0+i*dS,dY,i===aPh?5.5:3.5,0,Math.PI*2);aCX.fillStyle=i===aPh?aC.dOn:aC.dOff;aCX.fill()}
}
function aUpd(){
  document.getElementById('pbadge').textContent=`Phase ${aPh+1} / 6`;
  document.getElementById('ptitle').textContent=aPH[aPh].t;
  document.getElementById('pdesc').textContent=aPH[aPh].d;
  document.getElementById('bplay').textContent=aPlaying?'⏸ Pause':'▶ Abspielen';
}
function aLoop(ts){
  if(!aLast)aLast=ts;
  const dt=Math.min((ts-aLast)/1e3,.1)*aSpd;
  aLast=ts;aGT+=dt;
  if(aPlaying){
    if(aTr){aPr+=dt/aTDUR;if(aPr>=1){aPr=1;aTr=false;aHd=0}}
    else{aHd+=dt;if(aHd>=aHDUR){if(aPh<5){aFr=aPh;aPh++;aPr=0;aTr=true;aUpd()}else{aPlaying=false;aUpd()}}}
  }
  aDraw();requestAnimationFrame(aLoop);
}
function aToggle(){if(!aPlaying&&aPh===5&&!aTr)aReset();aPlaying=!aPlaying;aUpd()}
function aGo(d){const t=aPh+d;if(t<0||t>5)return;aFr=aPh;aPh=t;aPr=0;aTr=true;aHd=0;aUpd()}
function aReset(){aPh=0;aFr=0;aPr=1;aTr=false;aHd=0;aPlaying=false;aUpd()}
aUpd();requestAnimationFrame(aLoop);
</script>
</body>
</html>
